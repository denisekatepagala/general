<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microprocessor Quiz Reviewer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f2ed;--surface:#fff;--surface2:#eceae3;--border:#ddd9ce;
  --text:#1a1814;--muted:#8a8578;
  --accent:#c8522a;--accent-bg:#f7ede8;
  --blue:#2a6cc8;--blue-bg:#e8eff7;
  --green:#2a9c5a;--green-bg:#edf7f2;
  --correct:#2a9c5a;--correct-bg:#edf7f2;--correct-border:#a8d5bc;
  --wrong:#c8522a;--wrong-bg:#f7ede8;--wrong-border:#f0b8a0;
  --mono:'IBM Plex Mono',monospace;--sans:'Outfit',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
.wrap{max-width:780px;margin:0 auto;padding:0 20px;}
header{border-bottom:1px solid var(--border);padding:18px 0;display:flex;align-items:center;gap:12px;}
.logo{width:34px;height:34px;background:var(--text);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo span{color:var(--bg);font-family:var(--mono);font-size:12px;font-weight:600;}
.logo-text h1{font-size:15px;font-weight:700;}
.logo-text p{font-size:11px;color:var(--muted);font-family:var(--mono);}
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .2s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* SELECTOR */
#sel{padding:44px 0 80px;}
.hero{margin-bottom:36px;}
.hero h2{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:8px;}
.hero h2 em{font-style:normal;color:var(--accent);}
.hero p{font-size:14px;color:var(--muted);font-family:var(--mono);}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
@media(max-width:520px){.cards{grid-template-columns:1fr;}.hero h2{font-size:26px;}}
.qcard{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:20px 18px;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;overflow:hidden;user-select:none;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ca,var(--accent));border-radius:12px 0 0 12px;opacity:0;transition:opacity .15s;}
.qcard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.07);}
.qcard.sel{border-color:var(--ca,var(--accent));background:var(--cb,var(--accent-bg));}
.qcard.sel::before{opacity:1;}
.card-num{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:2px;color:var(--ca,var(--accent));margin-bottom:8px;display:block;}
.qcard h3{font-size:15px;font-weight:700;margin-bottom:3px;}
.card-cnt{font-size:11px;color:var(--muted);font-family:var(--mono);}
.chk{position:absolute;top:12px;right:12px;width:17px;height:17px;background:var(--ca,var(--accent));border-radius:50%;display:none;align-items:center;justify-content:center;}
.chk::after{content:'';width:8px;height:4px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block;}
.qcard.sel .chk{display:flex;}
.opts-bar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
.tog{display:flex;align-items:center;gap:7px;padding:8px 15px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.tog:hover{border-color:var(--text);color:var(--text);}
.tog.on{background:var(--text);border-color:var(--text);color:var(--bg);}
.start-btn{width:100%;padding:15px;background:var(--text);color:var(--bg);border:none;border-radius:12px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:-.2px;}
.start-btn:hover{background:#333;transform:translateY(-1px);}
.start-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;}

/* QUIZ */
#quiz{padding:24px 0 80px;}
.qbar{display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.back-btn{padding:6px 13px;background:var(--surface);border:1.5px solid var(--border);border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0;}
.back-btn:hover{border-color:var(--text);color:var(--text);}
.prog-track{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--text);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.q-num{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
.q-num strong{color:var(--text);}

/* BREADCRUMB DOTS */
.breadcrumb{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:22px;padding:10px 0;border-bottom:1px solid var(--border);}
.bdot{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:all .15s;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bdot:hover{border-color:var(--text);color:var(--text);}
.bdot.current{border-color:var(--text);background:var(--text);color:var(--bg);}
.bdot.done-c{border-color:var(--correct);background:var(--correct-bg);color:var(--correct);}
.bdot.done-w{border-color:var(--wrong);background:var(--wrong-bg);color:var(--wrong);}

.q-src{font-family:var(--mono);font-size:10px;letter-spacing:1px;color:var(--muted);background:var(--surface2);display:inline-block;padding:3px 9px;border-radius:4px;margin-bottom:14px;}
.q-txt{font-size:19px;font-weight:600;line-height:1.45;margin-bottom:26px;letter-spacing:-.3px;}
.opts-list{display:flex;flex-direction:column;gap:9px;margin-bottom:20px;}
.opt{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;cursor:pointer;text-align:left;font-family:var(--sans);font-size:14px;color:var(--text);line-height:1.4;transition:all .12s;width:100%;}
.opt:hover:not(:disabled):not(.correct):not(.wrong){border-color:var(--text);background:var(--surface2);}
.opt-k{width:22px;height:22px;flex-shrink:0;border-radius:5px;background:var(--surface2);border:1px solid var(--border);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .12s;}
.opt:hover:not(:disabled):not(.correct):not(.wrong) .opt-k{background:var(--text);border-color:var(--text);color:var(--bg);}
.opt.correct{border-color:var(--correct-border);background:var(--correct-bg);}
.opt.correct .opt-k{background:var(--correct);border-color:var(--correct);color:#fff;}
.opt.wrong{border-color:var(--wrong-border);background:var(--wrong-bg);}
.opt.wrong .opt-k{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt:disabled{cursor:default;}
.opt.past-correct{border-color:var(--correct-border);background:var(--correct-bg);cursor:default;}
.opt.past-correct .opt-k{background:var(--correct);border-color:var(--correct);color:#fff;}
.opt.past-wrong{border-color:var(--wrong-border);background:var(--wrong-bg);cursor:default;}
.opt.past-wrong .opt-k{background:var(--wrong);border-color:var(--wrong);color:#fff;}

.fb{padding:13px 16px;border-radius:10px;font-size:13px;line-height:1.5;margin-bottom:18px;display:none;border-left:4px solid;}
.fb.show{display:block;}
.fb.ok{background:var(--correct-bg);border-color:var(--correct);color:#1a5c38;}
.fb.bad{background:var(--wrong-bg);border-color:var(--wrong);color:#7a2c10;}
.fb .ans{font-weight:700;display:block;margin-top:3px;}
.nav-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.nav-btn{padding:11px 22px;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.nav-btn.ghost{background:var(--surface);border:1.5px solid var(--border);color:var(--muted);}
.nav-btn.ghost:hover{border-color:var(--text);color:var(--text);}
.nav-btn.primary{background:var(--text);color:var(--bg);border:none;}
.nav-btn.primary:hover{background:#333;}
.nav-btn:disabled{opacity:.35;cursor:not-allowed;}
.auto-note{font-size:11px;color:var(--muted);font-family:var(--mono);font-style:italic;}

/* RESULTS */
#res{padding:56px 0 80px;text-align:center;}
.score-ring{width:130px;height:130px;margin:0 auto 24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;border:3.5px solid var(--text);}
.score-n{font-size:38px;font-weight:800;letter-spacing:-2px;line-height:1;}
.score-d{font-family:var(--mono);font-size:11px;color:var(--muted);}
.res-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:5px;}
.res-sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:32px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:32px;}
.sbox{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px;}
.sv{font-size:30px;font-weight:800;letter-spacing:-1px;}
.sv.g{color:var(--correct);}
.sv.r{color:var(--wrong);}
.sl{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.res-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.rb{padding:11px 22px;border-radius:9px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.rb.p{background:var(--text);color:var(--bg);border:none;}
.rb.p:hover{background:#333;}
.rb.g{background:var(--surface);color:var(--text);border:1.5px solid var(--border);}
.rb.g:hover{border-color:var(--text);}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo"><span>μP</span></div>
  <div class="logo-text"><h1>Microprocessor Reviewer</h1><p>Quiz 1 · Quiz 2 · Quiz 3</p></div>
</header>

<!-- SELECTOR -->
<div id="sel" class="screen active">
  <div class="hero">
    <h2>Choose your<br><em>quiz set.</em></h2>
    <p>// pick one, combine, or take them all</p>
  </div>
  <div class="cards">
    <div class="qcard" id="c1" style="--ca:#c8522a;--cb:#f7ede8" onclick="toggleCard(1)">
      <div class="chk"></div>
      <span class="card-num">QUIZ 01</span>
      <h3>Fundamentals</h3>
      <div class="card-cnt" id="cnt1">— questions</div>
    </div>
    <div class="qcard" id="c2" style="--ca:#2a6cc8;--cb:#e8eff7" onclick="toggleCard(2)">
      <div class="chk"></div>
      <span class="card-num">QUIZ 02</span>
      <h3>Memory &amp; Addressing</h3>
      <div class="card-cnt" id="cnt2">— questions</div>
    </div>
    <div class="qcard" id="c3" style="--ca:#2a9c5a;--cb:#edf7f2" onclick="toggleCard(3)">
      <div class="chk"></div>
      <span class="card-num">QUIZ 03</span>
      <h3>Instructions &amp; Code</h3>
      <div class="card-cnt" id="cnt3">— questions</div>
    </div>
  </div>
  <div class="opts-bar">
    <button class="tog" id="togRand" onclick="toggleRand()">⇄ Randomize</button>
    <button class="tog" id="togAll" onclick="selectAll()">◈ Select all</button>
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>Start Quiz →</button>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
  <div class="qbar">
    <button class="back-btn" onclick="goSel()">← Back</button>
    <div class="prog-track"><div class="prog-fill" id="pbar" style="width:0%"></div></div>
    <span class="q-num" id="qnum"><strong>1</strong>/1</span>
  </div>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="q-src" id="qsrc"></div>
  <div class="q-txt" id="qtxt"></div>
  <div class="opts-list" id="optlist"></div>
  <div class="fb" id="fb"></div>
  <div class="nav-row">
    <button class="nav-btn ghost" id="prevBtn" onclick="goPrev()">← Prev</button>
    <span class="auto-note" id="autonote"></span>
    <button class="nav-btn primary" id="nextBtn" onclick="goNext()" style="display:none">Next →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="res" class="screen">
  <div class="score-ring">
    <div class="score-n" id="sn">0</div>
    <div class="score-d" id="sd">/ 0</div>
  </div>
  <div class="res-title" id="rt">Done!</div>
  <div class="res-sub" id="rs">—</div>
  <div class="stats">
    <div class="sbox"><div class="sv g" id="ss1">0</div><div class="sl">CORRECT</div></div>
    <div class="sbox"><div class="sv r" id="ss2">0</div><div class="sl">WRONG</div></div>
    <div class="sbox"><div class="sv" id="ss3">0%</div><div class="sl">SCORE</div></div>
  </div>
  <div class="res-btns">
    <button class="rb p" onclick="restartSame()">↺ Retry same</button>
    <button class="rb g" onclick="goSel()">Choose different</button>
  </div>
</div>
</div>

<script>
// ── ALL QUESTIONS ──────────────────────────────────────────────

const Q1 = [
  {q:"How many bits wide are the general purpose registers in an 8086?",a:"16 bits",o:["8 bits","16 bits","32 bits","64 bits"]},
  {q:"Which register holds the address of the current stack frame?",a:"EBP",o:["ESP","EBP","EIP","ECX"]},
  {q:"What is the primary advantage of using registers compared to main memory?",a:"Faster access time",o:["Larger capacity","Faster access time","Lower cost","Easier to program"]},
  {q:"What happens when a value is pushed onto the stack?",a:"SP is decremented, and the value is stored at the new address",o:["SP is incremented, and the value is stored at the new address","The value overwrites the current content of ESP","SP is decremented, and the value is stored at the new address","The value is stored in the highest numbered register"]},
  {q:"What happens when a program calls a function?",a:"Return address is pushed onto the stack",o:["Return address is pushed onto the stack","Data Segment Register (DS) is modified","All registers are cleared","IP points to the beginning of the program"]},
  {q:"What was the first application of the transistor?",a:"Transistor radios",o:["Pocket calculators","Transistor radios","Hearing aids","Personal computers"]},
  {q:"Which company developed the first commercially successful RISC processor?",a:"MIPS Computer Systems",o:["Intel","IBM","MIPS Computer Systems","Sun Microsystems"]},
  {q:"Who is considered the 'father of the microprocessor'?",a:"Ted Hoff",o:["Gordon Moore","Robert Noyce","Ted Hoff","Jack Kilby"]},
  {q:"What was the significance of the LSI circuit?",a:"It allowed for the creation of more complex circuits on a single chip",o:["It reduced power consumption","It allowed for the creation of more complex circuits on a single chip","It increased clock speeds","It replaced vacuum tubes"]},
  {q:"The most basic but complete microprocessor-based computer would consist of:",a:"CPU, memory, I/O, system bus",o:["CPU and memory only","CPU, memory, and I/O","CPU, memory, I/O, system bus","CPU, memory, I/O, system bus, and power supply"]},
  {q:"What was the primary function of the first microprocessors?",a:"Calculator operations",o:["Gaming","Word processing","Calculator operations","Floating point numbers"]},
  {q:"What was the name of the first commercially available 8-bit microprocessor?",a:"Intel 8080",o:["Intel 4004","Intel 8008","Intel 8080","Motorola 6800"]},
  {q:"What is the purpose of an interrupt?",a:"To allow a device to request service from the microprocessor",o:["To store data and instructions","To speed up processing","To allow a device to request service from the microprocessor","To reset the system"]},
  {q:"Who is credited with the invention of the Large Scale Integration (LSI) circuit?",a:"Robert Noyce",o:["Ted Hoff","Jack Kilby","Gordon Moore","Robert Noyce"]},
  {q:"What is the primary trend in microprocessor development?",a:"All of the choices",o:["Increased transistor density","Lower power consumption","Faster speeds","All of the choices"]},
  {q:"Which year did Jack Kilby invent the first integrated circuit?",a:"1958",o:["1947","1952","1958","1964"]},
  {q:"Which microprocessor was the first developed primarily for games?",a:"Intel 4004",o:["Intel 8080","Intel 4004","Motorola 6800","Zilog Z80"]},
  {q:"The level of integration in an IC has no bearing on its performance.",a:"False",o:["True","False"]},
  {q:"What is the main function of a microprocessor?",a:"To perform arithmetic and logic operations",o:["To store data","To display graphics","To perform arithmetic and logic operations","To provide power to the system"]},
  {q:"Which Pentium model was primarily used in server systems?",a:"Pentium Pro",o:["Pentium MMX","Pentium II","Pentium Pro","Pentium III"]},
  {q:"What are the three components of the Control Unit (CU)?",a:"Instruction Decoder, Timing, Control Logic",o:["ALU, Decoder, Memory","RAM, Control Logic, I/O Ports","Instruction Decoder, Timing, Control Logic","Data Bus, Address Bus, Control Bus"]},
  {q:"What component distinguishes a microcontroller from a typical microprocessor?",a:"Read-write memory",o:["ALU","Read-write memory","CPU","Control unit"]},
  {q:"Which technique is used for handling CTRL for I/O devices?",a:"Isolated I/O or Port-mapped I/O",o:["Memory-Mapped I/O","Timing","Isolated I/O or Port-mapped I/O","Control Logic"]},
  {q:"Punch cards were a reliable method for storing and managing computer programs.",a:"False",o:["True","False"]},
  {q:"Who developed the first microprocessor and in what year?",a:"Ted Hoff in 1971",o:["Ted Hoff in 1971","Jack Kilby in 1947","Robert Noyce in 1958","Gordon Moore in 1959"]},
  {q:"What is the main difference between a microprocessor and a microcontroller?",a:"Microcontroller has additional components like memory and I/O interfaces",o:["Microcontroller is used only in embedded systems","Microprocessor is faster than a microcontroller","Microcontroller has additional components like memory and I/O interfaces","Microprocessor has a simpler instruction set"]},
  {q:"Given HitRatio=90%, Tcache=1ns, Tram=2ns, MissRatio=10%, what is Tacc?",a:"0.002",o:["0.01","2.1","0.002","0.00001"]},
  {q:"Which processors are designed specifically for high demand servers?",a:"Xeon MP",o:["Pentium Pro","Core i9","Xeon MP","Itanium 2"]},
  {q:"When the current history bit is 01 and the predicted branch is taken, what is the next value?",a:"11",o:["00","01","10","11"]},
  {q:"After each byte of the instruction is fetched, Program Counter is incremented.",a:"True",o:["True","False"]},
  {q:"This bus is responsible for specifying the time and direction of the transfer.",a:"Control Bus",o:["Data Bus","Address Bus","Control Bus","System Bus"]},
  {q:"The processor uses these registers to control accesses to memory and I/O.",a:"Segment registers",o:["General-purpose registers","Segment registers","Instruction pointer","Flag registers"]},
  {q:"It fetches instructions in program order from the instruction cache.",a:"Fetch-Decode Unit",o:["Execute Unit","Dispatch Unit","Fetch-Decode Unit","Control Logic"]},
  {q:"Which stage sets the Memory and register read, floating-point data?",a:"ER",o:["PF","D1","D2","ER"]},
  {q:"It is the compromise between the direct-mapped and fully associative designs.",a:"Set-associative cache",o:["Direct-mapped cache","Fully associative cache","Set-associative cache","Write-through cache"]},
  {q:"The FPU achieves its quick speed through which pipeline order?",a:"PF-D1-D2-X1-X2-EX-WF-ER",o:["PF-D1-D2-X1-X2-EX-WF-ER","PF-D1-D2-EX-WF-ER","D1-D2-X1-X2-EX-WF","PF-D2-X1-X2-EX-ER"]},
  {q:"A reservation station controls the flow of data through which unit?",a:"Dispatch-Execute Unit",o:["Fetch-Decode Unit","Dispatch-Execute Unit","Instruction Cache","Control Logic"]},
  {q:"This cycle is used to transfer up to 8 bytes of non-cacheable data.",a:"Burst Cycle",o:["Bus Cycle","Read Cycle","Burst Cycle","Write Cycle"]},
  {q:"Pentium employs a technique called branch ___.",a:"branch prediction",o:["branch prediction","branch delay","branch folding","branch elimination"]},
  {q:"Under special circumstances, how many integer or FP instructions can Pentium execute?",a:"4",o:["2","3","4","5"]},
  {q:"Fill out the blank: a _____ converts source code into machine language.",a:"Compiler",o:["Assembler","Compiler","Linker","Interpreter"]},
  {q:"Processors capable of parallel instruction execution of multiple instructions are called:",a:"Superscalar machines",o:["Pipeline processors","Superscalar machines","RISC machines","CISC machines"]},
  // Numbered MCQ section
  {q:"What register pair is used for string operations in Intel processors?",a:"ESI-EDI",o:["ESI-EDI","EBP-ESP","ECX-EDX","EAX-EBX"]},
  {q:"The EFLAGS register is an extension of the FLAGS register found in which microprocessor family?",a:"80386",o:["80286","Pentium","8080","80386"]},
  {q:"A doubleword 66963286H stored in memory using little endian format starting at 00100H. What is the content of memory location 00103H?",a:"66",o:["32","86","96","66"]},
  {q:"What was the first commercially available personal computer to use the Intel 8080?",a:"Altair 8800",o:["Apple II","Altair 8800","IBM Personal Computer","Commodore PET"]},
  {q:"What is the primary purpose of the first ICs?",a:"Amplifiers",o:["Logic gates","Microprocessors","Amplifiers","Memory chips"]},
  {q:"The world's first 8-bit microprocessor.",a:"8008",o:["6800","8080","8008","Z80"]},
  {q:"Intel _____ is the first microprocessor developed primarily for games, test equipment and other simple digital systems.",a:"4004",o:["4004","8008","8080","8086"]},
  {q:"The ALUs are clocked at twice the frequency of the processor core. This describes:",a:"Rapid execution engine",o:["Rapid execution engine","Hyperthreading","Hyper-pipelined technology","Execution Trace Cache"]},
  {q:"Memory is sometimes accessed, I/O devices are used to display the results of the instruction execution. This is the _____ stage.",a:"Execute",o:["Execute","Reset","Fetch","Decode"]},
  {q:"Who is credited with the invention of the Large-Scale Integration (LSI) circuit containing thousands of transistors?",a:"Robert Noyce",o:["Gordon Moore","Marcian Hoff","Ted Hoff","Robert Noyce"]},
  {q:"Microcontrollers are a type of microprocessor with additional functionalities.",a:"True",o:["True","False"]},
  {q:"What is the purpose of an interrupt? (signaling)",a:"Signaling the need for the CPU's attention",o:["Shutting down the system","Increasing the processing speed","Connecting external devices","Signaling the need for the CPU's attention"]},
  {q:"A maximum of _____ micro-ops can be scheduled at once.",a:"Four",o:["Three","Two","Four","Five"]},
  {q:"In what year was the Itanium 2 processor released?",a:"2002",o:["1999","2002","2001","2000"]},

// ── STATE ──────────────────────────────────────────────────────
const QUIZZES=[{label:"Quiz 1",qs:Q1},{label:"Quiz 2",qs:Q2},{label:"Quiz 3",qs:Q3}];
let sel=new Set(),doRand=false;
let questions=[],cur=0,score=0;
// results[i] = { shuffledOpts, chosen, correct }
let results=[];

// ── SELECTOR ──────────────────────────────────────────────────
document.getElementById('cnt1').textContent=Q1.length+' questions';
document.getElementById('cnt2').textContent=Q2.length+' questions';
document.getElementById('cnt3').textContent=Q3.length+' questions';

function toggleCard(n){
  if(sel.has(n))sel.delete(n);else sel.add(n);
  [1,2,3].forEach(i=>document.getElementById('c'+i).classList.toggle('sel',sel.has(i)));
  document.getElementById('startBtn').disabled=sel.size===0;
  document.getElementById('togAll').classList.toggle('on',sel.size===3);
}
function toggleRand(){doRand=!doRand;document.getElementById('togRand').classList.toggle('on',doRand);}
function selectAll(){
  if(sel.size===3){sel.clear();}else{sel.add(1);sel.add(2);sel.add(3);}
  [1,2,3].forEach(i=>document.getElementById('c'+i).classList.toggle('sel',sel.has(i)));
  document.getElementById('startBtn').disabled=sel.size===0;
  document.getElementById('togAll').classList.toggle('on',sel.size===3);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  questions=[];
  sel.forEach(n=>QUIZZES[n-1].qs.forEach(q=>questions.push({...q,source:'Quiz '+n})));
  if(doRand)shuffle(questions);
  // pre-generate shuffled options for each question
  results=questions.map(q=>{
    const opts=doRand?shuffle([...q.o]):[...q.o];
    return{shuffledOpts:opts,chosen:null,correct:false};
  });
  cur=0;score=0;
  showQ();
  show('quiz');
}

// ── QUIZ ──────────────────────────────────────────────────────
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goSel(){show('sel');}

function showQ(){
  const total=questions.length;
  const q=questions[cur];
  const r=results[cur];

  // progress
  const answered=results.filter(x=>x.chosen!==null).length;
  document.getElementById('pbar').style.width=(answered/total*100)+'%';
  document.getElementById('qnum').innerHTML='<strong>'+(cur+1)+'</strong>/'+total;

  // breadcrumb
  buildBreadcrumb();

  document.getElementById('qsrc').textContent=q.source.toUpperCase();
  document.getElementById('qtxt').textContent=q.q;

  const keys=['A','B','C','D','E'];
  const list=document.getElementById('optlist');
  list.innerHTML='';

  const isPast=r.chosen!==null;

  r.shuffledOpts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML=`<span class="opt-k">${keys[i]}</span><span>${o}</span>`;

    if(isPast){
      btn.disabled=true;
      if(o===q.a) btn.classList.add('past-correct');
      if(o===r.chosen && o!==q.a) btn.classList.add('past-wrong');
    } else {
      btn.onclick=()=>pick(btn,o,q.a);
    }
    list.appendChild(btn);
  });

  // feedback
  const fb=document.getElementById('fb');
  if(isPast){
    fb.className='fb show '+(r.correct?'ok':'bad');
    fb.innerHTML=r.correct?'Correct!':'Incorrect. <span class="ans">Correct answer: '+q.a+'</span>';
  } else {
    fb.className='fb';fb.innerHTML='';
  }

  // nav
  document.getElementById('prevBtn').disabled=cur===0;
  const nb=document.getElementById('nextBtn');
  if(isPast){
    nb.style.display='inline-block';
    nb.textContent=cur+1<total?'Next →':'See results →';
  } else {
    nb.style.display='none';
  }
  document.getElementById('autonote').textContent=(!isPast)?'Correct answers auto-advance':'';
}

function buildBreadcrumb(){
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML='';
  questions.forEach((_,i)=>{
    const r=results[i];
    const d=document.createElement('button');
    d.className='bdot';
    d.textContent=i+1;
    d.title='Question '+(i+1);
    if(i===cur) d.classList.add('current');
    else if(r.chosen!==null && r.correct) d.classList.add('done-c');
    else if(r.chosen!==null && !r.correct) d.classList.add('done-w');
    d.onclick=()=>jumpTo(i);
    bc.appendChild(d);
  });
}

function jumpTo(i){cur=i;showQ();}

function pick(btn,chosen,correct){
  const r=results[cur];
  if(r.chosen!==null)return;
  r.chosen=chosen;
  r.correct=chosen===correct;
  if(r.correct)score++;

  // mark options
  document.querySelectorAll('.opt').forEach(b=>{
    const txt=b.querySelector('span:last-child').textContent;
    b.disabled=true;
    if(txt===correct) b.classList.add('correct');
    if(txt===chosen && txt!==correct) b.classList.add('wrong');
  });

  const fb=document.getElementById('fb');
  if(r.correct){
    fb.className='fb show ok';fb.textContent='Correct!';
    // auto-advance after short delay
    setTimeout(()=>{
      const total=questions.length;
      if(cur+1<total){cur++;showQ();}
      else{showResults();}
    },700);
  } else {
    fb.className='fb show bad';
    fb.innerHTML='Incorrect. <span class="ans">Correct answer: '+correct+'</span>';
    const nb=document.getElementById('nextBtn');
    nb.style.display='inline-block';
    nb.textContent=cur+1<questions.length?'Next →':'See results →';
  }
  buildBreadcrumb();
}

function goPrev(){if(cur>0){cur--;showQ();}}
function goNext(){
  const total=questions.length;
  if(cur+1<total){cur++;showQ();}
  else{showResults();}
}

function showResults(){
  const total=questions.length;
  const pct=Math.round(score/total*100);
  document.getElementById('sn').textContent=score;
  document.getElementById('sd').textContent='/ '+total;
  document.getElementById('rt').textContent=pct>=75?'Passed!':pct>=50?'Keep studying!':'Needs more review';
  document.getElementById('rs').textContent=pct+'% — '+score+' of '+total+' correct';
  document.getElementById('ss1').textContent=score;
  document.getElementById('ss2').textContent=total-score;
  document.getElementById('ss3').textContent=pct+'%';
  show('res');
}

function restartSame(){
  results=questions.map(q=>{
    const opts=doRand?shuffle([...q.o]):[...q.o];
    return{shuffledOpts:opts,chosen:null,correct:false};
  });
  if(doRand)shuffle(questions);
  cur=0;score=0;
  showQ();show('quiz');
}
</script>
